<style>
  .uml-grid {
    display: flex;
    gap: 1.5rem;
  }
  .uml-grid > .card:first-child {
    flex: 0 0 calc(60vw - 0.75rem - var(--side-w));
  }
  .uml-grid > .card:last-child {
    flex: 0 0 calc(40vw - 0.75rem);
  }
  .uml-grid > .card {
    margin: 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .notes-area,
  .dsl-area {
    min-height: calc(100vh - 200px);
    width: 100%;
    flex: 1;
    resize: vertical;
    font-family: monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 1rem;
    border: 1px solid var(--clr-border);
    border-radius: var(--radius);
    background: var(--clr-surface);
    color: var(--clr-text);
  }
  .mermaid svg {
    border-radius: var(--radius);
  }
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 1rem;
    border-bottom: 2px solid var(--clr-border);
  }
  .tab-bar button {
    padding: 0.4rem 1.2rem;
    border: none;
    background: none;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--clr-text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition:
      color 0.15s,
      border-color 0.15s;
  }
  .tab-bar button.active {
    color: var(--clr-accent);
    border-bottom-color: var(--clr-accent);
    font-weight: 600;
  }
  .tab-panel {
    display: none;
    flex: 1;
    flex-direction: column;
  }
  .tab-panel.active {
    display: flex;
    flex: 1;
  }
  @media (max-width: 960px) {
    .uml-grid {
      flex-direction: column;
    }
    .uml-grid > .card {
      flex: 1 1 auto;
    }
  }
</style>

<div class="uml-grid">
  <div class="card" style="overflow-x: auto">
    <h2>Simplified Vehicle Domain Model</h2>
    <p style="color: var(--clr-text-dim); margin-bottom: 0.5rem">
      NeTEx-informed but decoupled.
      <a
        href="https://github.com/entur/hathor/edit/ui-sandboxing/concept-sandbox/partials/uml_dsl.html"
        target="_blank"
        >edit</a
      >
    </p>

    <div class="tab-bar">
      <button class="active" onclick="switchTab(this, 'tab-uml')">UML</button>
      <button onclick="switchTab(this, 'tab-dsl')">DSL</button>
    </div>

    <div id="tab-uml" class="tab-panel active">
      <pre class="mermaid"></pre>
    </div>

    <div id="tab-dsl" class="tab-panel">
      <textarea id="dsl-editor" class="dsl-area"></textarea>
    </div>
  </div>

  <div class="card" hx-get="partials/uml_notes.html" hx-trigger="load" hx-swap="innerHTML"></div>
</div>

<script>
  async function switchTab(btn, panelId) {
    btn
      .closest('.card')
      .querySelectorAll('.tab-bar button')
      .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    btn
      .closest('.card')
      .querySelectorAll('.tab-panel')
      .forEach(p => p.classList.remove('active'));
    document.getElementById(panelId).classList.add('active');

    if (panelId === 'tab-uml') {
      const src = document.getElementById('dsl-editor').value;
      const el = document.querySelector('.mermaid');
      el.removeAttribute('data-processed');
      el.innerHTML = src;
      const { default: mermaid } =
        await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
      await mermaid.run({ querySelector: '.mermaid' });
    }
  }
</script>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      primaryColor: '#4e6cf2',
      primaryTextColor: '#fff',
      primaryBorderColor: '#3451c7',
      lineColor: '#6b7280',
      textColor: '#1e1e2e',
      mainBkg: '#f8f9fb',
      classText: '#1e1e2e',
    },
  });

  const res = await fetch('partials/uml_dsl.html');
  const html = await res.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const src = doc.querySelector('textarea').value.trim();

  document.getElementById('dsl-editor').value = src;
  document.querySelector('.mermaid').textContent = src;
  await mermaid.run({ querySelector: '.mermaid' });
</script>
