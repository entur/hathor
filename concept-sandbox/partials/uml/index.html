<style>
  .uml-grid {
    display: flex;
    gap: 0.5rem;
  }
  .uml-grid > .card:first-child {
    flex: 0 0 calc(76vw - 0.25rem - var(--side-w));
  }
  .uml-grid > .card:last-child {
    flex: 0 0 calc(24vw - 0.25rem);
    padding: 0.5rem;
  }
  .uml-grid > .card {
    margin: 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .notes-area {
    font-size: 0.75rem;
    padding: 0.25rem 0.4rem;
  }
  .notes-area,
  .dsl-area {
    min-height: calc(100vh - 200px);
    width: 100%;
    flex: 1;
    resize: vertical;
    font-family: monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 1rem;
    border: 1px solid var(--clr-border);
    border-radius: var(--radius);
    background: var(--clr-surface);
    color: var(--clr-text);
  }
  .mermaid svg {
    border-radius: var(--radius);
  }
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 1rem;
    border-bottom: 2px solid var(--clr-border);
  }
  .tab-bar button {
    padding: 0.4rem 1.2rem;
    border: none;
    background: none;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--clr-text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition:
      color 0.15s,
      border-color 0.15s;
  }
  .tab-bar button.active {
    color: var(--clr-accent);
    border-bottom-color: var(--clr-accent);
    font-weight: 600;
  }
  .tab-panel {
    display: none;
    flex: 1;
    flex-direction: column;
  }
  .tab-panel.active {
    display: flex;
    flex: 1;
  }
  @media (max-width: 960px) {
    .uml-grid {
      flex-direction: column;
    }
    .uml-grid > .card {
      flex: 1 1 auto;
    }
  }
</style>

<div class="uml-grid">
  <div
    class="card"
    style="overflow-x: auto"
    hx-get="partials/uml/diagram.html"
    hx-trigger="load"
    hx-swap="innerHTML"
  ></div>

  <div class="card" hx-get="partials/uml/notes.html" hx-trigger="load" hx-swap="innerHTML"></div>
</div>

<script type="module">
  // Wait for HTMX to settle diagram.html into DOM before init
  const grid = document.querySelector('.uml-grid');
  await new Promise((resolve, reject) => {
    if (grid.querySelector('.mermaid')) return resolve();
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('diagram.html load timeout'));
    }, 10_000);
    function cleanup() {
      clearTimeout(timer);
      document.body.removeEventListener('htmx:afterSettle', onSettle);
    }
    function onSettle() {
      if (grid.querySelector('.mermaid')) {
        cleanup();
        resolve();
      }
    }
    document.body.addEventListener('htmx:afterSettle', onSettle);
  });

  const { default: mermaid } =
    await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    themeVariables: {
      primaryColor: '#4e6cf2',
      primaryTextColor: '#fff',
      primaryBorderColor: '#3451c7',
      lineColor: '#6b7280',
      textColor: '#1e1e2e',
      mainBkg: '#f8f9fb',
      classText: '#1e1e2e',
    },
  });

  const res = await fetch('partials/uml/dsl.html?t=' + Date.now());
  if (!res.ok) throw new Error(`dsl.html: ${res.status}`);
  const html = await res.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const ta = doc.querySelector('textarea');
  if (!ta) throw new Error('dsl.html: no textarea found');
  const src = ta.value.trim();

  const editor = document.getElementById('dsl-editor');
  if (editor) editor.value = src;
  document.querySelector('.mermaid').textContent = src;
  await mermaid.run({ querySelector: '.mermaid' });
</script>
