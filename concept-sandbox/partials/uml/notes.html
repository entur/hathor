## 1. Vehicle + VehicleModel (NeTEx-normalised)
Vehicle holds instance props (chassisNumber, buildDate,
operationalNumber, registrationNumber, monitored).
VehicleModel holds model props (manufacturer, range, fullCharge).
Vehicle references VehicleModel via vehicleModelRef.

## 2. AbstractType -> Type | PlannedType via inheritance
NeTEx: Train/CompoundTrain/PoweredTrain/UnpoweredTrain inherit
VehicleType_VersionStructure.
Simplified: AbstractType is the shared base with a typeKind
discriminator (TypeKind enum). AbstractType HAS-A modeRef to
TransportMode. TransportMode uses a kind discriminator (ModeKind
enum) instead of NeTEx inheritance.

## 3. TransportMode subsumes NeTEx TransportMode enum
NeTEx TransportMode enum and train-specific grouping merged into one
entity. ModeKind covers Bus, Train, CompoundTrain, PoweredTrain,
UnpoweredTrain, Ferry. Train-specific props (trainSize, components)
are optional on TransportMode.

## 4. DeckPlan retained
Type references DeckPlan via deckPlanRef. DeckPlan composes both
Deck and DeckLevel arrays. Each Deck references a DeckLevel.
Deck hierarchy preserved at full depth from the
NeTEx-Deckplan-Editor: Deck > PassengerSpace > Spot/Entrance.

## 5. PlannedType inherits AbstractType, medium-prefixed scalars
PlannedType extends AbstractType for shared props (name, shortName,
propulsionTypes, fuelTypes, euroClass, selfPropelled, lowFloor,
hasLiftOrRamp, hybridCategory). Range props simplified: XxxRange
types replaced with scalar equivalents prefixed "medium" (e.g.
LengthRange length -> Length mediumLength). PlannedType references
Type directly via typeRefs. Potential future CEN NeTEx PR candidate.

## 6. Environmental KVs promoted
hathor's VehicleType KeyList extras (formDragCoeff,
rollResistanceCoeff, maximumEngineEffectKW, hybridCategory)
promoted to first-class props on Type (exact values) and
PlannedType (medium-prefixed scalars). hybridCategory is shared
via AbstractType.

## 7. Omnipresent inheritance excluded
EntityStructure, EntityInVersionStructure, DataManagedObjectStructure
(~19 infra props: id, version, validity, branding, etc.) stripped
from all entities per OMNIPRESENT_DEFS.

## Assumptions
- Deckplan props shown map every use of NeTEx elements
  in NeTEx-Deckplan-Editor
- Type and PlannedType props shown map hathor's VehicleType
  detail view page and extra KeyList KVs
