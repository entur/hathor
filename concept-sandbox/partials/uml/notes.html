## 1. VehicleModel merged into PhysicalVehicle
Vehicle + VehicleModel flattened into one entity. Eliminates the
VehicleModelRef indirection. PhysicalVehicle carries both instance
props (chassisNumber, buildDate) and model props (manufacturer,
range, fullCharge).

  TOOD: Split back to netex normalized form; Vechicle+VehicleModel kept

## 2. VehicleType-inheritance inverted via extended use of TransportMode
NeTEx: Train/CompoundTrain/PoweredTrain/UnpoweredTrain inherit
VehicleType_VersionStructure.
Simplified: Type HAS-A modeRef to TransportMode. TransportMode uses
a kind discriminator (ModeKind enum) instead of inheritance.

  TODO: rename to AbstractType->Type ( see no.5/PlannedType for more )

## 3. TransportMode subsumes NeTEx TransportMode enum
NeTEx TransportMode enum and train-specific grouping merged into one
entity. ModeKind covers Bus, Train, CompoundTrain, PoweredTrain,
UnpoweredTrain, Ferry. Train-specific props (trainSize, components)
are optional on TransportMode.

## 4. DeckPlan retained
Type references DeckPlan via deckPlanRef. DeckPlan composes both
Deck and DeckLevel arrays. Each Deck references a DeckLevel.
Deck hierarchy preserved at full depth from the
NeTEx-Deckplan-Editor: Deck > PassengerSpace > Spot/Entrance.

## 5. PlannedType combines refs + ranges
PlannedTypeByRefs indirection removed. PlannedType directly holds
both typeRefs (concrete Type references) and range constraints
(length, width, height, weight, capacity, etc. as [min, max]).
Potential future CEN NeTEx PR candidate.

  TODO: Introduce a AbstractType with prop typeKind -> Type|PlannedType
      PlannedType and Type delegates to AbstractType is shared props, Type stays true to Netex VehicleType. PlannedType gets the xxxxRange counterPart props, but simplified to using prefix "medium" and dropping "Range" suffix.

## 6. Environmental KVs promoted
hathor's VehicleType KeyList extras (formDragCoeff,
rollResistanceCoeff, maximumEngineEffectKW, hybridCategory)
promoted to first-class props on Type+PlannedType (medium prefixed in PlannedType)

## 7. Omnipresent inheritance excluded
EntityStructure, EntityInVersionStructure, DataManagedObjectStructure
(~19 infra props: id, version, validity, branding, etc.) stripped
from all entities per OMNIPRESENT_DEFS.

## Assumptions
- Deckplan props shown map every use of NeTEx elements
  in NeTEx-Deckplan-Editor
- Type and PlannedType props shown map hathor's VehicleType
  detail view page and extra KeyList KVs
