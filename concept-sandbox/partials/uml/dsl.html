<style>
  .dsl-standalone {
    width: 100%;
    min-height: 80vh;
    resize: vertical;
    font-family: monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 1rem;
    border: 1px solid var(--clr-border);
    border-radius: var(--radius);
    background: var(--clr-surface);
    color: var(--clr-text);
  }
</style>

<div class="card">
  <h2>Mermaid DSL</h2>
  <p style="color: var(--clr-text-dim); margin-bottom: 1rem">
    Editable mermaid source for the vehicle domain model.
  </p>
  <textarea class="dsl-standalone">
classDiagram
    class Type {
        +String name
        +String shortName
        +PropulsionType propulsionTypes
        +FuelType fuelTypes
        +String euroClass
        +Boolean selfPropelled
        +Distance maximumRange
        +Speed maximumVelocity
        +PassengerCapacity passengerCapacity
        +Length length
        +Length width
        +Length height
        +Weight weight
        +Boolean lowFloor
        +Boolean hasLiftOrRamp
        +Boolean monitored
        +String formDragCoeff
        +String rollResistanceCoeff
        +String maximumEngineEffectKW
        +String hybridCategory
    }

    class TransportMode {
        +ModeKind kind
        +TrainSize trainSize
        +Component components
    }

    class PhysicalVehicle {
        +String name
        +String shortName
        +Date buildDate
        +String chassisNumber
        +String registrationNumber
        +String operationalNumber
        +String manufacturer
        +Length range
        +WattHours fullCharge
        +Boolean monitored
    }

    class DeckLevel {
        +String label
    }

    class Deck {
        +String name
        +Number width
        +Number length
        +SpotRow spotRows
        +SpotColumn spotColumns
        +DeckLevel deckLevelRef
    }

    class PassengerSpace {
        +String name
        +SpaceType passengerSpaceType
    }

    class PassengerSpot {
        +String label
        +Number x
        +Number y
        +Number width
        +Number length
        +Orientation orientation
        +Boolean isByWindow
        +Boolean isByAisle
        +Boolean hasPower
        +SpotRow spotRowRef
        +SpotColumn spotColumnRef
    }

    class LuggageSpot {
        +String label
        +Number x
        +Number y
        +Number width
        +Number length
    }

    class PassengerEntrance {
        +String name
        +VehicleSide vehicleSide
        +Number width
        +Number x
        +Number y
        +int sequenceFromFront
    }

    class PlannedType {
        +String name
        +String shortName
        +LengthRange length
        +LengthRange width
        +LengthRange height
        +WeightRange weight
        +NumberRange passengerCapacity
        +DistanceRange maximumRange
        +SpeedRange maximumVelocity
        +NumberRange maximumEngineEffectKW
        +PropulsionType propulsionTypes
        +FuelType fuelTypes
        +String euroClass
        +String hybridCategory
        +Boolean lowFloor
        +Boolean selfPropelled
        +Boolean hasLiftOrRamp
        +NumberRange formDragCoeff
        +NumberRange rollResistanceCoeff
    }

    class TypeRef {
        +TBD kind
        +String typeId
    }

    class Component {
        +String label
        +int order
        +Orientation operationalOrientation
        +TrainElementType elementTypeRef
    }

    class ModeKind {
        &lt;&lt;enumeration&gt;&gt;
        Bus
        Train
        CompoundTrain
        PoweredTrain
        UnpoweredTrain
        Ferry
    }

    Type --> TransportMode : modeRef
    Type *-- DeckLevel : deckLevels
    Type *-- Deck : deckPlanRef
    PhysicalVehicle --> Type : typeRef
    Deck *-- PassengerSpace : deckspaces
    PassengerSpace *-- PassengerSpot : passengerSpots
    PassengerSpace *-- PassengerEntrance : deckEntrances
    PassengerSpace *-- LuggageSpot : luggageSpots
    PlannedType *-- TypeRef : typeRefs
    TypeRef --> Type : typeId
    PlannedType --> TransportMode : modeRef
    TransportMode *-- Component : components
    TransportMode --> ModeKind : kind

    style Type fill:#dce3fd,stroke:#4e6cf2,stroke-width:2px,color:#1e1e2e
    style TransportMode fill:#dce3fd,stroke:#4e6cf2,stroke-width:2px,color:#1e1e2e
    style ModeKind fill:#dce3fd,stroke:#4e6cf2,stroke-width:2px,color:#1e1e2e
    style Component fill:#dce3fd,stroke:#4e6cf2,stroke-width:2px,color:#1e1e2e
    style PhysicalVehicle fill:#d4f0de,stroke:#2d8a4e,stroke-width:2px,color:#1e1e2e
    style Deck fill:#fde4cc,stroke:#e07830,stroke-width:2px,color:#1e1e2e
    style PassengerSpace fill:#fde4cc,stroke:#e07830,stroke-width:2px,color:#1e1e2e
    style PassengerSpot fill:#fef0e0,stroke:#d89840,stroke-width:2px,color:#1e1e2e
    style PassengerEntrance fill:#fef0e0,stroke:#d89840,stroke-width:2px,color:#1e1e2e
    style DeckLevel fill:#fde4cc,stroke:#e07830,stroke-width:2px,color:#1e1e2e
    style LuggageSpot fill:#fef0e0,stroke:#d89840,stroke-width:2px,color:#1e1e2e
    style PlannedType fill:#e8d5f5,stroke:#9b59b6,stroke-width:2px,color:#1e1e2e
    style TypeRef fill:#e8d5f5,stroke:#9b59b6,stroke-width:2px,color:#1e1e2e
  </textarea>
</div>
