name: Deploy Concept Sandbox to GitHub Pages

on:
  push:
    branches: [main, ui-sandboxing]
    paths:
      - 'concept-sandbox/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to concept-sandbox branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./concept-sandbox
          publish_branch: concept-sandbox
