name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Unit tests with coverage
      run: npm run test:coverage
    - name: Check Sobek schema in sync
      run: |
        set -uo pipefail
        url=https://entur.github.io/sobek/schema.graphqls
        live=/tmp/sobek.live.graphqls
        # Retry transient network/5xx errors, cap total time. A genuine fetch
        # failure (or empty body) is an outage — warn and skip, don't fail as drift.
        if ! curl -fsS --retry 3 --retry-delay 2 --retry-all-errors --max-time 30 "$url" -o "$live" \
           || [ ! -s "$live" ]; then
          echo "::warning::Could not fetch upstream Sobek schema (outage?) — skipping drift check."
          exit 0
        fi
        # Fetch succeeded, so any diff is real drift.
        if ! diff -u src/graphql/sobek.schema.graphqls "$live"; then
          echo "::error::Sobek schema drift detected — re-sync: curl -s $url -o src/graphql/sobek.schema.graphqls then update e2e fixtures (npm test src/data/netex/e2eFixturesContract.test.ts)"
          exit 1
        fi
        echo "Sobek schema in sync."
    - name: Install Playwright Browsers
      run: npx playwright install
    - name: Playwright auth ON
      run: npm run e2e:auth
    - name: Playwright auth OFF
      run: npm run e2e:no-auth
      env:
        E2E_BACKEND: 'false'
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
