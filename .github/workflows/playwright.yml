name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Unit tests with coverage
      run: npm run test:coverage
    - name: Check Sobek schema in sync
      run: |
        curl -fsS https://entur.github.io/sobek/schema.graphqls -o /tmp/sobek.live.graphqls
        if ! diff -u src/graphql/sobek.schema.graphqls /tmp/sobek.live.graphqls; then
          echo "::error::Sobek schema drift detected — sync schema from backend: curl -s https://entur.github.io/sobek/schema.graphqls -o src/graphql/sobek.schema.graphqls then update e2e fixtures to fit (npm test src/data/netex/e2eFixturesContract.test.ts)"
          exit 1
        fi
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Playwright auth ON
      run: npm run e2e:auth
    - name: Playwright auth OFF
      run: npm run e2e:no-auth
      env:
        E2E_BACKEND: 'false'
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
