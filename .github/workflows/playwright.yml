name: Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  # Schema-drift guard — cheap (curl + diff against the vendored snapshot, no
  # npm ci). Gates the e2e matrix: a drift means the mock fixtures may be stale,
  # so don't spend the browser matrix on a suspect contract. Adds only seconds.
  schema:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check Sobek schema in sync
      run: |
        set -uo pipefail
        url=https://entur.github.io/sobek/schema.graphqls
        live=/tmp/sobek.live.graphqls
        # Retry transient network/5xx errors, cap total time. A genuine fetch
        # failure (or empty body) is an outage — warn and skip, don't fail as drift.
        if ! curl -fsS --retry 3 --retry-delay 2 --retry-all-errors --max-time 30 "$url" -o "$live" \
           || [ ! -s "$live" ]; then
          echo "::warning::Could not fetch upstream Sobek schema (outage?) — skipping drift check."
          exit 0
        fi
        # Fetch succeeded, so any diff is real drift.
        if ! diff -u src/graphql/sobek.schema.graphqls "$live"; then
          echo "::error::Sobek schema drift detected — re-sync: curl -s $url -o src/graphql/sobek.schema.graphqls then update e2e fixtures (npm test src/data/netex/e2eFixturesContract.test.ts)"
          exit 1
        fi
        echo "Sobek schema in sync."

  # Unit tests + coverage. Sibling of e2e (no `needs`) — a unit failure and an
  # e2e failure never block each other; both report independently.
  unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Unit tests with coverage
      run: npm run test:coverage

  # Browser matrix — chromium + firefox on separate runners, concurrently. Each
  # leg runs the single merged e2e suite at the default (multi) worker count;
  # tests serve their own config.json via route interception, so they are
  # parallel-safe. ~29 min serial → ~one browser's wall-time.
  e2e:
    needs: schema
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      # Isolate per-browser failures — one browser red must not cancel the other.
      fail-fast: false
      matrix:
        project: [chromium, firefox]
    # Browsers + OS deps come preinstalled in the official Playwright image,
    # pinned to the @playwright/test version the e2e runner resolves to
    # (1.58.2). This sidesteps the `npx playwright install` browser-download
    # that hung and cancelled every run at the 60-min timeout.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      # Firefox/WebKit sandbox via user namespaces (clone()), which the default
      # container seccomp profile blocks → "CanCreateUserNamespace EPERM".
      # Relax seccomp so Firefox can launch; Chromium is unaffected.
      options: --security-opt seccomp=unconfined
    # Inside a container GitHub runs `run:` steps with `sh` (dash); force bash —
    # present in the image — to match host-runner behaviour.
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Playwright (${{ matrix.project }})
      run: npm run e2e -- --project=${{ matrix.project }}
      # GH runs the container as root but sets HOME=/github/home (owned by the
      # image's pwuser); Firefox refuses to run as root with a foreign HOME.
      # Point HOME at a root-owned dir so Firefox launches.
      env:
        E2E_BACKEND: 'false'
        HOME: /root
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        # Unique per leg — upload-artifact@v4 rejects duplicate names.
        name: playwright-report-${{ matrix.project }}
        path: playwright-report/
        retention-days: 30
