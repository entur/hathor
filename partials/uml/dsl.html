<style>
  .dsl-standalone {
    width: 100%;
    min-height: 80vh;
    resize: vertical;
    font-family: monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    padding: 1rem;
    border: 1px solid var(--clr-border);
    border-radius: var(--radius);
    background: var(--clr-surface);
    color: var(--clr-text);
  }
</style>

<div class="card">
  <h2>Mermaid DSL</h2>
  <p style="color: var(--clr-text-dim); margin-bottom: 1rem">
    Editable mermaid source for the vehicle domain model.
  </p>
  <textarea class="dsl-standalone">
classDiagram
    class AbstractType {
        +TypeKind typeKind
        +String name
        +String shortName
        +PropulsionType propulsionTypes
        +FuelType fuelTypes
        +String euroClass
        +Boolean selfPropelled
        +Boolean lowFloor
        +Boolean hasLiftOrRamp
        +String hybridCategory
    }

    class Type {
        +Distance maximumRange
        +Speed maximumVelocity
        +PassengerCapacity passengerCapacity
        +Length length
        +Length width
        +Length height
        +Weight weight
        +Boolean monitored
        +String formDragCoeff
        +String rollResistanceCoeff
        +String maximumEngineEffectKW
    }

    class PlannedType {
        +Length mediumLength
        +Length mediumWidth
        +Length mediumHeight
        +Weight mediumWeight
        +Number mediumPassengerCapacity
        +Distance mediumMaximumRange
        +Speed mediumMaximumVelocity
        +Number mediumMaximumEngineEffectKW
        +Number mediumFormDragCoeff
        +Number mediumRollResistanceCoeff
    }

    class TypeKind {
        &lt;&lt;enumeration&gt;&gt;
        Type
        PlannedType
    }

    class TransportMode {
        +ModeKind kind
        +TrainSize trainSize
        +Component components
    }

    class ModeKind {
        &lt;&lt;enumeration&gt;&gt;
        Bus
        Train
        CompoundTrain
        PoweredTrain
        UnpoweredTrain
        Ferry
    }

    class Component {
        +String label
        +int order
        +Orientation operationalOrientation
        +TrainElementType elementTypeRef
    }

    class Vehicle {
        +String name
        +String shortName
        +Date buildDate
        +String chassisNumber
        +String registrationNumber
        +String operationalNumber
        +Boolean monitored
    }

    class VehicleModel {
        +String name
        +String manufacturer
        +Length range
        +WattHours fullCharge
    }

    class DeckPlan {
        +String name
    }

    class DeckLevel {
        +String label
    }

    class Deck {
        +String name
        +Number width
        +Number length
        +SpotRow spotRows
        +SpotColumn spotColumns
        +DeckLevel deckLevelRef
    }

    class PassengerSpace {
        +String name
        +SpaceType passengerSpaceType
    }

    class PassengerSpot {
        +String label
        +Number x
        +Number y
        +Number width
        +Number length
        +Orientation orientation
        +Boolean isByWindow
        +Boolean isByAisle
        +Boolean hasPower
        +SpotRow spotRowRef
        +SpotColumn spotColumnRef
    }

    class PassengerEntrance {
        +String name
        +VehicleSide vehicleSide
        +Number width
        +Number x
        +Number y
        +int sequenceFromFront
    }

    class LuggageSpot {
        +String label
        +Number x
        +Number y
        +Number width
        +Number length
    }

    AbstractType &lt;|-- Type
    AbstractType &lt;|-- PlannedType
    AbstractType --> TransportMode : modeRef
    AbstractType --> TypeKind : typeKind
    AbstractType --> DeckPlan : deckPlanRef
    Vehicle --> AbstractType : typeRef
    Vehicle --> VehicleModel : vehicleModelRef
    DeckPlan *-- Deck : decks
    DeckPlan *-- DeckLevel : deckLevels
    Deck --> DeckLevel : deckLevelRef
    Deck *-- PassengerSpace : deckspaces
    PassengerSpace *-- PassengerSpot : passengerSpots
    PassengerSpace *-- PassengerEntrance : deckEntrances
    PassengerSpace *-- LuggageSpot : luggageSpots
    TransportMode *-- Component : components
    TransportMode --> ModeKind : kind

    style AbstractType fill:#e8d5f5,stroke:#9b59b6,stroke-width:2px,color:#1e1e2e
    style Type fill:#e8d5f5,stroke:#9b59b6,stroke-width:2px,color:#1e1e2e
    style TypeKind fill:#e8d5f5,stroke:#9b59b6,stroke-width:2px,color:#1e1e2e
    style TransportMode fill:#dce3fd,stroke:#4e6cf2,stroke-width:2px,color:#1e1e2e
    style ModeKind fill:#dce3fd,stroke:#4e6cf2,stroke-width:2px,color:#1e1e2e
    style Component fill:#dce3fd,stroke:#4e6cf2,stroke-width:2px,color:#1e1e2e
    style Vehicle fill:#d4f0de,stroke:#2d8a4e,stroke-width:2px,color:#1e1e2e
    style VehicleModel fill:#d4f0de,stroke:#2d8a4e,stroke-width:2px,color:#1e1e2e
    style DeckPlan fill:#fde4cc,stroke:#e07830,stroke-width:2px,color:#1e1e2e
    style DeckLevel fill:#fde4cc,stroke:#e07830,stroke-width:2px,color:#1e1e2e
    style Deck fill:#fde4cc,stroke:#e07830,stroke-width:2px,color:#1e1e2e
    style PassengerSpace fill:#fde4cc,stroke:#e07830,stroke-width:2px,color:#1e1e2e
    style PassengerSpot fill:#fef0e0,stroke:#d89840,stroke-width:2px,color:#1e1e2e
    style PassengerEntrance fill:#fef0e0,stroke:#d89840,stroke-width:2px,color:#1e1e2e
    style LuggageSpot fill:#fef0e0,stroke:#d89840,stroke-width:2px,color:#1e1e2e
    style PlannedType fill:#e8d5f5,stroke:#9b59b6,stroke-width:2px,color:#1e1e2e
  </textarea>
</div>
