<style>
  .def-wrapper {
    position: relative;
    width: 100%;
    height: calc(100vh - var(--header-h));
    min-height: 500px;
  }

  .def-table {
    width: 100%;
    height: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .def-table th {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: 1px solid var(--clr-border);
  }

  .def-table th.frame-header {
    background: rgba(78, 108, 242, 0.06);
    color: var(--clr-accent);
  }

  .def-table th.res-header {
    background: rgba(34, 139, 34, 0.06);
    color: #2d8a4e;
  }

  .def-table tbody tr {
    height: 33.33%;
  }

  .def-table td {
    border: 1px solid var(--clr-border);
    background: var(--clr-surface);
    vertical-align: bottom;
    padding: 12px;
  }

  .def-table .zone-label {
    font-size: 12px;
    color: #c0c4cc;
    font-weight: 500;
    user-select: none;
  }

  /* ── SVG overlay ── */
  .def-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .def-svg .box-group {
    pointer-events: all;
    cursor: grab;
  }

  .def-svg .box-group:active {
    cursor: grabbing;
  }

  .def-svg .box-label-primary {
    font-family:
      Inter,
      -apple-system,
      BlinkMacSystemFont,
      'Segoe UI',
      Roboto,
      sans-serif;
    font-size: 12px;
    font-weight: 700;
    fill: #fff;
  }

  .def-svg .box-label-secondary {
    font-family:
      Inter,
      -apple-system,
      BlinkMacSystemFont,
      'Segoe UI',
      Roboto,
      sans-serif;
    font-size: 10px;
    font-weight: 400;
    fill: rgba(255, 255, 255, 0.75);
  }

  .def-svg .box-label-dark {
    fill: #1e1e2e;
  }

  .def-svg .box-label-secondary.box-label-dark {
    fill: rgba(30, 30, 46, 0.6);
  }
</style>

      }

      const resCol = cols[3] || cols[cols.length - 1];
      const resY = rows[0].y;
      const resH = rows.reduce((sum, r) => sum + r.h, 0);

      return { cols, rows, resCol, resY, resH };

    // ── Edges: VehicleType → Vehicle (hardcoded, green) ──
    const edges = [

      { from: 'vt-artic', to: 'v-man' },
      { from: 'vt-artic', to: 'v-byd' },

      { from: 'vt-lightrail', to: 'v-sl18' },
      { from: 'vt-emu', to: 'v-flirt' },
      { from: 'vt-citybus2', to: 'v-volvo7900' },
    ];

    // Identify Org and Role boxes for proximity edge detection
    const orgIds = frameBoxes.filter(b => b.netex === 'Organisation').map(b => b.id);
    const roleIds = frameBoxes.filter(b => b.id.startsWith('role-')).map(b => b.id);

    // Width lookup per box
    const widthOf = {};
    for (const b of [...frameBoxes, ...resourceBoxes]) {
      widthOf[b.id] =
        b.netex === 'StakeholderRole' ? ROLE_W : b.netex === 'Organisation' ? ORG_W : BOX_W;
    }

    // Deterministic pseudo-random from a seed (0..1)
    function jitter(seed) {
      const x = Math.sin(seed * 9301 + 49297) * 49297;
      return x - Math.floor(x);
    }

    function computePositions() {
      const z = getZones();
      const positions = {};

      // Split frame boxes: VehicleType separate from others
      const gridBoxesByCell = {};
      const vtBoxesByCell = {};
      for (const box of frameBoxes) {
        const key = `${box.col}-${box.row}`;
        if (box.netex === 'VehicleType') {
          if (!vtBoxesByCell[key]) vtBoxesByCell[key] = [];
          vtBoxesByCell[key].push(box);
        } else {
          if (!gridBoxesByCell[key]) gridBoxesByCell[key] = [];
          gridBoxesByCell[key].push(box);
        }
      }

      // Pack boxes as Org→Role pairs within each cell
      // Array order: [Org, Role, Org, Role, ...] so pairs are (0,1), (2,3), …
      const pairW = ORG_W + GAP + ROLE_W;
      for (const key of Object.keys(gridBoxesByCell)) {
        const boxes = gridBoxesByCell[key];
        const [colIdx, rowIdx] = key.split('-').map(Number);
        const col = z.cols[colIdx];
        const row = z.rows[rowIdx];

        const startX = col.x + PAD;
        const startY = row.y + PAD;
        const availW = col.w - PAD * 2;
        const pairsPerRow = Math.max(1, Math.floor((availW + GAP) / (pairW + GAP)));

        const nPairs = Math.floor(boxes.length / 2);
        for (let p = 0; p < nPairs; p++) {
          const org = boxes[p * 2];
          const role = boxes[p * 2 + 1];
          const pairCol = p % pairsPerRow;
          const pairRow = Math.floor(p / pairsPerRow);
          // Shared jitter so the pair moves as a unit
          const seed = colIdx * 17 + rowIdx * 31 + p * 7;
          const jx = (jitter(seed) - 0.5) * 18;
          const jy = (jitter(seed + 3) - 0.5) * 10;
          const baseX = startX + pairCol * (pairW + GAP) + jx;
          const baseY = startY + pairRow * (BOX_H + GAP) + jy;
          positions[org.id] = { x: baseX, y: baseY };
          positions[role.id] = { x: baseX + ORG_W + GAP, y: baseY };
        }
      }

      // VehicleType boxes — placed directly below the Org→Role pairs
      for (const key of Object.keys(vtBoxesByCell)) {
        const boxes = vtBoxesByCell[key];
        const [colIdx, rowIdx] = key.split('-').map(Number);
        const col = z.cols[colIdx];
        const row = z.rows[rowIdx];

        const grid = gridBoxesByCell[key] || [];
        const nPairs = Math.floor(grid.length / 2);
        const startX = col.x + PAD;
        const startY = row.y + PAD;
        const vtY = startY + nPairs * (BOX_H + GAP);

        boxes.forEach((box, i) => {
          const seed = colIdx * 11 + rowIdx * 23 + i * 5;
          const jx = (jitter(seed) - 0.5) * 12;
          positions[box.id] = {
            x: startX + jx,
            y: vtY + i * (BOX_H + GAP),
          };
        });
      }

      // Resource boxes — evenly spaced in the resources column
      const resSpacing = z.resH / (resourceBoxes.length + 1);
      for (const box of resourceBoxes) {
        positions[box.id] = {
          x: z.resCol.x + (z.resCol.w - BOX_W) / 2,
          y: z.resY + resSpacing * (box.idx + 1) - BOX_H / 2,
        };
      }

      return positions;
    }

    let positions = computePositions();
    // Live positions track drag movement for edge updates
    let livePos = {};
    let clipIdCounter = 0;

    function edgePath(fromId, toId) {
      const fp = livePos[fromId];
      const tp = livePos[toId];
      if (!fp || !tp) return '';
      const x1 = fp.x + (widthOf[fromId] || BOX_W),
        y1 = fp.y + BOX_H / 2;
      const x2 = tp.x,
        y2 = tp.y + BOX_H / 2;
      const dx = (x2 - x1) * 0.4;
      return `M${x1},${y1} C${x1 + dx},${y1} ${x2 - dx},${y2} ${x2},${y2}`;
    }

    // Detect Org boxes near Role boxes for dynamic edge drawing
    function findProximityEdges() {
      const result = [];
      for (const orgId of orgIds) {
        const org = livePos[orgId];
        if (!org) continue;
        for (const roleId of roleIds) {
          const role = livePos[roleId];
          if (!role) continue;
          const dx = role.x - (org.x + ORG_W);
          const dy = Math.abs(org.y + BOX_H / 2 - (role.y + BOX_H / 2));
          if (dx > -10 && dx < 40 && dy < 20) {
            result.push({ from: orgId, to: roleId });
          }
        }
      }
      return result;
    }

    function updateEdges() {
      // Update hardcoded VehicleType→Vehicle edges (green)
      svg.selectAll('.edge-path').each(function () {
        const el = d3.select(this);
        el.attr('d', edgePath(el.attr('data-from'), el.attr('data-to')));

      // Recompute proximity Org→Role edges (orange)
      const proxG = svg.select('.prox-edges');
      proxG.selectAll('*').remove();
      for (const { from, to } of findProximityEdges()) {

          .attr('d', edgePath(from, to))
          .attr('fill', 'none')
          .attr('stroke', 'rgba(224,120,48,0.5)')
          .attr('stroke-width', 1.5)
          .attr('marker-end', 'url(#arrowhead-orange)')
          .attr('pointer-events', 'none');
      }
    }

        .attr('data-id', box.id)

      group.append('title').text(box.title);

      const boxW =
        box.netex === 'StakeholderRole' ? ROLE_W : box.netex === 'Organisation' ? ORG_W : BOX_W;
      const clipId = 'clip-' + clipIdCounter++;
      group
        .append('clipPath')
        .attr('id', clipId)
        .append('rect')
        .attr('width', boxW)
        .attr('height', BOX_H)
        .attr('rx', 8)
        .attr('ry', 8);

      group
        .append('rect')
        .attr('width', boxW)
        .attr('height', BOX_H)
        .attr('rx', 8)
        .attr('ry', 8)
        .attr('fill', box.fill)
        .attr('filter', 'url(#box-shadow)');

      const textDark = box.textDark || false;
      const textG = group.append('g').attr('clip-path', `url(#${clipId})`);
      const hasIcon = !!box.icon;
      const textX = hasIcon ? boxW / 2 + 10 : boxW / 2;

      if (hasIcon) {
        textG
          .append('text')
          .attr('x', 14)
          .attr('y', 30)
          .attr('font-size', '18px')
          .attr('text-anchor', 'middle')
          .text(box.icon);
      }

      textG
        .append('text')
        .attr('class', 'box-label-primary' + (textDark ? ' box-label-dark' : ''))
        .attr('x', textX)
        .attr('y', 17)
        .attr('text-anchor', 'middle')
        .text(box.label);

      textG
        .append('text')
        .attr('class', 'box-label-secondary' + (textDark ? ' box-label-dark' : ''))
        .attr('x', textX)
        .attr('y', 34)
        .attr('text-anchor', 'middle')
        .text('(' + box.netex + ')');

      // D3 drag — updates livePos and redraws edges
      const boxId = box.id;
      const drag = d3
        .drag()
        .on('start', function () {
          d3.select(this).raise();
        })
        .on('drag', function (event) {
          const curr = d3.select(this);
          const [cx, cy] = curr
            .attr('transform')
            .match(/translate\(([^,]+),\s*([^)]+)\)/)
            .slice(1)
            .map(Number);
          const nx = cx + event.dx,
            ny = cy + event.dy;
          curr.attr('transform', `translate(${nx}, ${ny})`);
          livePos[boxId] = { x: nx, y: ny };
          updateEdges();
        });

      group.call(drag);
    }

    function renderEdges(g) {
      for (const edge of edges) {
        g.append('path')
          .attr('class', 'edge-path')
          .attr('data-from', edge.from)
          .attr('data-to', edge.to)
          .attr('d', edgePath(edge.from, edge.to))
          .attr('fill', 'none')
          .attr('stroke', 'rgba(100,200,120,0.5)')
          .attr('stroke-width', 1.5)
          .attr('marker-end', 'url(#arrowhead)')
          .attr('pointer-events', 'none');
      }
    }

    function render() {
      svg.selectAll('g.box-group, g.edges, g.prox-edges').remove();
      clipIdCounter = 0;
      // Sync livePos from computed positions
      livePos = {};
      for (const id of Object.keys(positions)) {
        livePos[id] = { ...positions[id] };
      }
      const g = svg.append('g');

      // Green edges behind boxes
      const edgeG = g.append('g').attr('class', 'edges');
      renderEdges(edgeG);

      // Orange proximity edges behind boxes
      g.append('g').attr('class', 'prox-edges');

      for (const box of frameBoxes) {
        renderBox(g, box, positions[box.id]);
      }
      for (const box of resourceBoxes) {
        renderBox(g, box, positions[box.id]);
      }

      // Draw initial proximity edges
      updateEdges();
    }

    render();

    // Reposition on resize
    window.addEventListener('resize', () => {
      positions = computePositions();
      render();
    });
  })();
</script>
